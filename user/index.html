<!doctype html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta http-equiv="X-UA-Compatible" content="IE=edge" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<link rel="icon" href="docs/logo.svg">
	<link rel="stylesheet" href="./style.css">
</head>


<!-- Marked.js - Markdown renderer -->
<script src="https://cdn.jsdelivr.net/npm/marked@5.1.1/marked.min.js"></script>

<!-- OPTIONAL : Highlight.js - Syntax Highlighting -->
<!--
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.3.1/highlight.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.3.1/styles/base16/solarized-dark.min.css">
-->

<!-- USER CONFIG -->
<script>
	config = {
		sitePath: "/",
		browserRouter: false,
		name: "Raitoo",
		serveLocalNonMdContent: true, //serve images / files that are not markdown as if they were static files
		directoryIndex: "README", //file for slash ending directories (e.g. https://host/dir/ -> https://host/dir/README.md)
		fileExtension: ".md", //extension for naked directories (e.g /dirs/about -> /dirs/about.md)
		components: [],//["docs/navbar", "docs/github"],
		footers: [] //"docs/footer"],
	};
</script>
<body>
	<div id="components"></div>
	<div id="content"></div>
	<div id="footer"></div>
</body>

<script>
	/* in general, raito does a few BIG things:
		- provide a stub index.html that fetches markdown files and embeds them into the html body of index.html
		- modifies the event handler for <a href> tags 
		- rewrites url paths (cleanPath) on local servers to work with a pseudo local directory
	*/

	const markedProps = {};
	if (typeof hljs !== "undefined")
		markedProps.highlight = (code) => hljs.highlightAuto(code).value;

	let cwd = "";
	const contentDiv = document.getElementById("content");
	const footersDiv = document.getElementById("footer");
	const componentsDiv = document.getElementById("components");
	if (!config.browserRouter) config.sitePath = config.sitePath + "#/";
	config.contentPath = config.sitePath;


	function fixLocalPath(path, skipRebase) {
		console.log("fixLocalPath in\tsitePath:",config.sitePath, cwd, path, skipRebase);
		if(path.startsWith("/")) {
			if (skipRebase && !config.browserRouter) {
				path = cleanPath(path.slice(1));
			} else {
				path = cleanPath(config.sitePath + path.slice(1));
			}
		} else {
			if (skipRebase &&  !config.browserRouter) {
				path = cleanPath(cwd + path);
			} else {
				path = cleanPath(config.sitePath + cwd + path);
			}
		}

		// posible alternative to path resolution below; needs further testing
		newHref = (""+new URL(path, "http://example.com").href).slice("http://example.com".length);

		// Resolve paths
		path = path
			.split("/")
			.reduce((a, v) => {
				if (v === ".");
				else if (v === "..") a.pop();
				else a.push(v);
				return a;
			}, [])
			.join("/");
		if (path == "") path = "/";
		console.log("fixLocalPath out\tsitePath:",config.sitePath, cwd, path, skipRebase);
		return path;
	}

	// Rewrite relative URLs
	marked.use({
		walkTokens: (token) => {
			if ("link" == token.type && !/^[a-z]*:\/\/*\b/.test(token.href)) {
				token.href = fixLocalPath(token.href, skipRebase = false);
			} else if ("link" != token.type && token.href && !/^[a-z]*:\/\/*\b/.test(token.href)) {
				// is an html tag with a src / href that is not a link (usually an img tag)
				token.href = fixLocalPath(token.href, skipRebase = true);
			}
		},
	});
	marked.use({
		extensions: [{
			name: 'include',
			level: 'inline',
			start: (src) => src.indexOf("include("),
			tokenizer(src) {
				const match = /^include\((.*?)\)/.exec(src);
				if (match) {
					return {
						type: 'include',
						raw: match[0],
						url: match[1],
						html: '',
					};
				}
			},
			renderer: (token) => token.html,
		}],
		async: true,
		async walkTokens(token) {
			if (token.type === 'include') {
				url = token.url
				token.url = cwd + cleanPath(token.url)
				try{
					token.html = await renderMD(token.url)
				} catch (err) {
					token.html = `<span class="include-error"><em>Warning!</em> Resource ${url} not found!</span>`;
				}
			}
		}
	});

	const checkLocalResourceExists = async (path) => {
		//https://stackoverflow.com/questions/1979915/can-i-check-if-a-file-exists-at-a-url
		try {
			console.log('checking ' + path);
			console.log(path.slice(3));
			console.log(path.slice(6));
			if (path.slice(-3) == ".md" || path.slice(-6) == "README") return false;
			if (path.slice(-1) == "/") { 
				path = window.location.host+path;
			} 
			const res = await fetch(`${config.contentPath}${path}`, {method: "HEAD"});		
			return res.status == 200
		} catch(ex) {
			console.log('resource check exception: ' + ex);
		}
		return false;
	}

	const renderMD = async (path) => {
		if (path.indexOf("#") != -1) path = path.substr(0, path.lastIndexOf("#"));
		if (path.slice(-1) == "/" || path == "") path += "README";

		// check if resource exists as is - without MD
		if (config.serveLocalNonMdContent) {
			if (await checkLocalResourceExists(path)) {
				console.log('found true! on '+path);
				window.location.replace(`${config.contentPath}${path}`);
				return;
				//https://stackoverflow.com/questions/503093/how-do-i-redirect-to-another-webpage
				//https://stackoverflow.com/questions/1368264/how-to-extract-the-hostname-portion-of-a-url-in-javascript
			}
		}
		// resource doesn't exist, fetch the markdown
		const res = await fetch(`${config.contentPath}${path}.md`);
		if (res.status != 200) throw Error();
		const markdown = await res.text();
		if (markdown.startsWith("<!doctype html>")) throw Error();
		return marked.parse(markdown, markedProps);
	};

	const loadComponent = async (element, destDiv) => {
		const html = await renderMD(element);
		if (!html) return;
		let div = document.createElement("div");
		div.innerHTML = html;
		div.id = element.replaceAll("/", "-");
		destDiv.prepend(div);
	};



	const cleanPath = (path) => {
		// remove .md from end of path if it exists
		// i.e. https://something.com/bones.md > https://something.com/bones
		if (path.slice(-3) == ".md") path = path.slice(0, -3);

		// change any references to README with the base directory instead, i.e.
		// i.e. https://something.com/README > https://something.com/
		if (path.endsWith("README")) path = path.slice(0, -6);
		return path;
	};

	const loadContent = async () => {
		try {
			// Clean URL
			let path;
			// get current directory 'location' on the server
			path = window.location.pathname + window.location.hash;
			// change root links to server root, e.g [go here](/docs/README.md) > [go here](<https://config.site.path>/docs/README.md)
			if (!config.browserRouter && path == "/") path = config.sitePath;
			// get current working directory (deepest folder of current location)
			cwd = path.substr(0, path.lastIndexOf("/")) + "/";

			// if cwd is part of the site, cut sitepath out
			if (cwd.startsWith(config.sitePath)) cwd = cwd.slice(config.sitePath.length);
			// if path is part of the site, cut sitepath out
			if (path.startsWith(config.sitePath)) path = path.slice(config.sitePath.length);
			path = cleanPath(path);
			console.log("path post fixes: ", path, " and current directory: ", cwd);
			// handle 'in document' anchor links, e.g. https://mysite.com/README.md#toc
			const selector = path.indexOf("#") == -1 ? null : path.substr(path.lastIndexOf("#") + 1);
			
			// Load Markdown
			contentDiv.innerHTML = "";
			contentDiv.innerHTML = (await renderMD(path)) || "";

			// Reformat document
			document.title = (document.querySelectorAll("h1")[0]?.innerText || "") + " | " + config.name || "";
			document.querySelectorAll("#content input[type=checkbox]").forEach((checkbox) => {
				checkbox.disabled = "";
				checkbox.parentElement.parentElement.classList.add("checklist");
			});
			if (config.browserRouter)
				// add a new event handler for all links
				document.querySelectorAll("a").forEach((a) => {
					const href = a.getAttribute("href");
					if (!/^[a-z]*:\/\/*\b/.test(href))
						a.onclick = (event) => {
							event.preventDefault();
							window.history.pushState({}, window.title, href);
							loadContent();
						};
				});
			if (selector) document.getElementById(selector)?.scrollIntoView()

			document.body.classList.add("loaded");
			if (!config.browserRouter) window.location.replace(config.sitePath + path);
		} catch (err) {
			if ((config.browserRouter && window.location.pathname != config.sitePath) || (!config.browserRouter && window.location.hash != config.sitePath)) {
				location.replace(config.sitePath);
			}
		}
	};

	window.onload = async () => {
		await Promise.all((config.components || []).map((component) => loadComponent(component, componentsDiv)));
		await loadContent();
		await Promise.all((config.footers || []).map((footer) => loadComponent(footer, footersDiv)));
	};
	window.onhashchange = loadContent;
	if (config.browserRouter) window.onpopstate = loadContent;
</script>

</html>
